services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build:
      context: ../..
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY . .
        RUN pip install -e ".[celery,all]" fastapi uvicorn
    command: celery -A examples.celery_fastapi.app:celery_app worker --loglevel=info
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
